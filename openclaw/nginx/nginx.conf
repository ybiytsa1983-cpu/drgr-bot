events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream api {
        server api:8000;
    }

    # Dashboard on port 8080
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls from dashboard
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy FastAPI paths directly
        location ~ ^/(health|products|categories|ai|dashboard|users)/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # HTTP redirect on port 80 -> 8080
    server {
        listen 80;
        server_name _;
        return 301 http://$host:8080$request_uri;
    }
}
