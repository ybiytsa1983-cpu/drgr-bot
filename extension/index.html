<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DRGR Local Comet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#eee}
.header{background:#0d1b2a;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333}
.header h1{font-size:1.2rem;color:#e94560;font-weight:600}
.header span{font-size:.8rem;color:#666}
.container{max-width:800px;margin:0 auto;padding:20px}
.tabs{display:flex;background:#0d1b2a;border-radius:8px;margin-bottom:20px;overflow:hidden}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:.9rem;color:#aaa;border:none;background:none;transition:all .2s}
.tab:hover{color:#ddd;background:rgba(255,255,255,.05)}
.tab.active{color:#fff;background:rgba(233,69,96,.15);border-bottom:2px solid #e94560}
.panel{display:none;padding:20px;background:#0d1b2a;border-radius:8px}
.panel.active{display:block}
h3{color:#4ec9b0;font-size:1.1rem;margin-bottom:14px}
.status-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;font-size:.9rem}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.dot-green{background:#0f0}.dot-red{background:#f00}
button{padding:8px 18px;background:#0e639c;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;transition:background .2s}
button:hover{background:#1177bb}
.btn-red{background:#e94560}
.btn-red:hover{background:#c73650}
textarea{width:100%;height:180px;background:#111;color:#ddd;border:1px solid #333;border-radius:6px;padding:10px;font-family:monospace;font-size:.85rem;resize:vertical}
input[type=text]{width:100%;padding:8px 12px;background:#222;border:1px solid #444;border-radius:6px;color:#fff;font-size:.9rem;margin-bottom:10px}
label{font-size:.85rem;color:#aaa;display:block;margin-bottom:6px}
#reportArea{background:#111;border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:12px}
</style>
</head>
<body>
<div class="header">
  <h1>☄️ DRGR Local Comet</h1>
  <span>v1.0</span>
</div>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="status">📊 Статус</div>
    <div class="tab" data-tab="sandbox">🧪 Sandbox</div>
    <div class="tab" data-tab="settings">⚙️ Настройки</div>
  </div>

  <!-- Status -->
  <div id="panel-status" class="panel active">
    <h3>🖥️ DRGR VM Статус</h3>
    <div id="statusRows"></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button id="btnRefresh" onclick="refreshStatus()">🔄 Обновить</button>
      <button id="btnOpenVM" onclick="openVM()">🌐 Открыть VM</button>
    </div>
    <div id="reportArea">Нажмите «Обновить»</div>
  </div>

  <!-- Sandbox -->
  <div id="panel-sandbox" class="panel">
    <h3>🧪 Sandbox</h3>
    <textarea id="sandboxCode" placeholder="Введите запрос для AI..."></textarea>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button onclick="runSandbox()">▶ Выполнить</button>
    </div>
    <div id="sandboxResult" style="margin-top:10px;font-size:.85rem;color:#aaa"></div>
  </div>

  <!-- Settings -->
  <div id="panel-settings" class="panel">
    <h3>⚙️ Настройки</h3>
    <label>URL виртуальной машины:</label>
    <input type="text" id="vmUrl" value="http://localhost:5001">
    <button id="btnSaveCfg" onclick="saveCfg()">💾 Сохранить</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
