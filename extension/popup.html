<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DRGR VM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;min-height:400px;font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#eee}
.tabs{display:flex;background:#0d1b2a;border-bottom:1px solid #333}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:.85rem;color:#aaa;border:none;background:none}
.tab.active{color:#fff;border-bottom:2px solid #e94560}
.panel{display:none;padding:14px}
.panel.active{display:block}
h3{color:#4ec9b0;font-size:.95rem;margin-bottom:10px}
.status-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;font-size:.85rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:#0f0}.dot-red{background:#f00}
button{padding:6px 14px;background:#0e639c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.85rem}
button:hover{background:#1177bb}
.btn-red{background:#e94560}
.btn-red:hover{background:#c73650}
textarea{width:100%;height:120px;background:#111;color:#ddd;border:1px solid #333;border-radius:6px;padding:8px;font-family:monospace;font-size:.8rem;resize:vertical}
input[type=text]{width:100%;padding:6px 10px;background:#222;border:1px solid #444;border-radius:4px;color:#fff;font-size:.85rem;margin-bottom:8px}
label{font-size:.8rem;color:#aaa;display:block;margin-bottom:4px}
#reportArea{background:#111;border-radius:6px;padding:10px;font-family:monospace;font-size:.75rem;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-top:8px}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" data-tab="status">Status</div>
  <div class="tab" data-tab="sandbox">Sandbox</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- Status -->
<div id="panel-status" class="panel active">
  <h3>DRGR VM Status</h3>
  <div id="statusRows"></div>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button id="btnRefresh" onclick="refreshStatus()">Refresh</button>
    <button id="btnOpenVM" onclick="openVM()">Open VM</button>
  </div>
  <div id="reportArea">Press Refresh</div>
</div>

<!-- Sandbox -->
<div id="panel-sandbox" class="panel">
  <h3>Sandbox</h3>
  <textarea id="sandboxCode" placeholder="Enter a prompt for AI..."></textarea>
  <div style="margin-top:8px;display:flex;gap:8px">
    <button onclick="runSandbox()">Run</button>
  </div>
  <div id="sandboxResult" style="margin-top:8px;font-size:.8rem;color:#aaa"></div>
</div>

<!-- Settings -->
<div id="panel-settings" class="panel">
  <h3>Settings</h3>
  <label>VM URL:</label>
  <input type="text" id="vmUrl" value="http://localhost:5005">
  <button id="btnSaveCfg" onclick="saveCfg()">Save</button>
</div>

<script src="popup.js"></script>
</body>
</html>
