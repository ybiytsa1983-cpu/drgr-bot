<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DRGR Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #533483;
    }
    .header img { width: 32px; height: 32px; border-radius: 6px; }
    .header-text h1 { font-size: 15px; font-weight: 700; color: #e94560; }
    .header-text p  { font-size: 10px; color: #888; margin-top: 1px; }

    .status-bar {
      padding: 7px 16px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #16213e;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background .4s;
    }
    .dot.online  { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .dot.offline { background: #f44336; }

    .actions {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 9px 12px;
      background: #0f3460; border: 1px solid #533483;
      border-radius: 8px; color: #e0e0e0;
      font-size: 12px; cursor: pointer;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn:hover { background: #533483; border-color: #e94560; }
    .btn span.ico { font-size: 16px; }

    .port-row {
      padding: 0 14px 8px;
      display: flex; align-items: center; gap: 6px; font-size: 11px;
    }
    .port-row input {
      width: 70px; padding: 3px 6px; background: #0f3460;
      border: 1px solid #533483; border-radius: 5px;
      color: #e0e0e0; font-size: 11px;
    }
    .port-row button {
      padding: 3px 8px; background: #533483; border: none;
      border-radius: 5px; color: #fff; font-size: 11px; cursor: pointer;
    }
    .port-row button:hover { background: #e94560; }

    .footer {
      padding: 7px 14px 10px;
      font-size: 10px; color: #555; text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <img src="icons/icon48.png" alt="logo" id="logo" onerror="this.style.display='none'">
  <div class="header-text">
    <h1>DRGR Bot</h1>
    <p>Локальный AI-помощник</p>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Проверка соединения…</span>
</div>

<div class="port-row">
  <span>Порт:</span>
  <input type="number" id="portInput" value="5001" min="1" max="65535">
  <button id="savePort">Сохранить</button>
</div>

<div class="actions">
  <button class="btn" id="openUI">
    <span class="ico">🌐</span> Открыть веб-интерфейс
  </button>
  <button class="btn" id="openChat">
    <span class="ico">💬</span> Открыть чат
  </button>
  <button class="btn" id="openResearch">
    <span class="ico">🔍</span> Исследование
  </button>
  <button class="btn" id="openImagegen">
    <span class="ico">🎨</span> Генерация изображений
  </button>
  <button class="btn" id="checkHealth">
    <span class="ico">🩺</span> Проверить состояние
  </button>
</div>

<div class="footer" id="footer">DRGR Bot v1.0 · localhost</div>

<script src="popup.js"></script>
</body>
</html>
