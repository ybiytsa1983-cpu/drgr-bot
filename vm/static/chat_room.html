<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>💬 DRGR Chat Room</title>
<style>
:root {
  --bg:     #1e1e1e;
  --bg2:    #252526;
  --bg3:    #2d2d2d;
  --bg4:    #333;
  --border: #3c3c3c;
  --text:   #d4d4d4;
  --text2:  #888;
  --accent: #0078d4;
  --accent2:#1a8cff;
  --me:     #1e4d2b;
  --other:  #252526;
  --sys:    #4d3800;
  --green:  #4ec94e;
  --red:    #f44747;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 15px;
  overflow: hidden;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%; height: 100dvh;
  max-width: 900px;
  margin: 0 auto;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
#header h1 { font-size: 16px; font-weight: 700; flex: 1; white-space: nowrap; }
#online-badge {
  font-size: 12px;
  color: var(--green);
  background: rgba(78,201,78,.12);
  border: 1px solid rgba(78,201,78,.3);
  border-radius: 20px;
  padding: 2px 10px;
  white-space: nowrap;
}
#user-info {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
#user-info:hover { opacity: .85; }
#header-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
#header-nick { font-size: 13px; font-weight: 600; }
#btn-settings {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 13px;
  cursor: pointer;
}
#btn-settings:hover { background: var(--bg4); }

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overscroll-behavior: contain;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

.msg {
  display: flex;
  gap: 8px;
  max-width: 82%;
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:none } }
.msg-me {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.msg-other { align-self: flex-start; }
.msg-sys { align-self: center; max-width: 100%; }

.msg-avatar-wrap {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 2px;
}
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.msg-content {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.msg-me .msg-content { align-items: flex-end; }
.msg-other .msg-content { align-items: flex-start; }
.msg-nick {
  font-size: 11px;
  color: var(--text2);
  padding: 0 4px;
}
.msg-bubble {
  background: var(--other);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg-me .msg-bubble {
  background: var(--me);
  border-color: #2d6b3d;
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  color: #e6ffe6;
}
.msg-other .msg-bubble {
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
}
.msg-sys .msg-bubble {
  background: var(--sys);
  border-color: #6b5200;
  color: #dcdcaa;
  font-size: 12px;
  border-radius: 20px;
  padding: 4px 14px;
}
.msg-ts {
  font-size: 10px;
  color: var(--text2);
  padding: 0 4px;
  display: flex;
  gap: 6px;
  align-items: center;
}
.msg-edited-badge { font-size: 9px; color: var(--text2); font-style: italic; }
.msg-deleted .msg-bubble { color: var(--text2); font-style: italic; opacity: .6; }

/* ── Reply quote ── */
.msg-reply {
  background: var(--bg3);
  border-left: 3px solid var(--accent);
  border-radius: 6px 6px 0 0;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: -4px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}
.msg-reply-nick { color: var(--accent); font-weight: 600; }

/* ── Reactions ── */
.msg-reactions {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 2px 4px;
}
.reaction-pill {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 2px 8px;
  font-size: 13px; cursor: pointer; transition: background .12s;
  user-select: none;
}
.reaction-pill:hover { background: var(--bg4); }
.reaction-pill.mine { border-color: var(--accent); background: rgba(0,120,212,.15); }
.reaction-count { font-size: 11px; color: var(--text); }

/* ── Context menu ── */
#ctx-menu {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  z-index: 1000;
  min-width: 160px;
  overflow: hidden;
}
#ctx-menu button {
  display: flex; align-items: center; gap: 10px;
  width: 100%; background: none; border: none;
  color: var(--text); cursor: pointer;
  padding: 10px 16px; font-size: 13px;
  text-align: left; transition: background .1s;
}
#ctx-menu button:hover { background: var(--bg3); }
#ctx-menu button.danger { color: var(--red); }
#ctx-menu .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Reaction picker ── */
#reaction-picker {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  z-index: 1001;
  padding: 6px 10px;
  gap: 4px;
  flex-direction: row;
}
.rp-btn {
  background: none; border: none; cursor: pointer;
  font-size: 24px; padding: 4px; border-radius: 50%;
  line-height: 1; transition: transform .1s, background .1s;
}
.rp-btn:hover { transform: scale(1.3); background: var(--bg3); }

/* ── Reply bar ── */
#reply-bar {
  display: none;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px 14px;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
#reply-bar.show { display: flex; }
#reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
#reply-bar-nick { color: var(--accent); font-weight: 600; }
#reply-bar-cancel { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 2px 6px; }

/* ── Edit bar ── */
#edit-bar {
  display: none;
  background: rgba(0,120,212,.12);
  border-top: 1px solid var(--accent);
  padding: 6px 14px;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
#edit-bar.show { display: flex; }
#edit-bar-label { color: var(--accent); flex: 1; }
#edit-bar-cancel { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 2px 6px; }

/* ── Pinned messages bar ── */
#pinned-bar {
  display: none;
  background: rgba(0,120,212,.1);
  border-bottom: 1px solid var(--accent);
  padding: 6px 14px;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  cursor: pointer;
}
#pinned-bar.show { display: flex; }
#pinned-bar-icon { color: var(--accent); font-size: 14px; }
#pinned-bar-text { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#pinned-bar-count { font-size: 11px; color: var(--text2); background: var(--bg3); border-radius: 10px; padding: 2px 6px; }

/* ── Typing indicator ── */
.typing-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--text2);
  animation: typing-bounce .9s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typing-bounce { 0%,60%,100%{transform:none} 30%{transform:translateY(-5px)} }


#emoji-wrap { position: relative; display: inline-block; }
#emoji-picker {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  width: 300px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
#emoji-picker::-webkit-scrollbar { width: 3px; }
#emoji-picker::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
.ep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 32px);
  gap: 2px;
}
.ep-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  padding: 3px;
  border-radius: 6px;
  line-height: 1;
  transition: background .1s;
}
.ep-btn:hover { background: var(--bg4); }

/* ── Input area ── */
#input-area {
  padding: 10px 14px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
#msg-inp {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 15px;
  resize: none;
  overflow-y: hidden;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.45;
  font-family: inherit;
}
#msg-inp:focus { outline: none; border-color: var(--accent); }
#msg-inp::placeholder { color: var(--text2); }
#btn-emoji-open {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
#btn-emoji-open:hover { background: var(--bg4); }
#btn-send {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 9px 18px;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 600;
}
#btn-send:hover { filter: brightness(1.15); }
#btn-send:disabled { background: var(--bg4); color: var(--text2); cursor: not-allowed; filter: none; }

/* ── Status bar ── */
#status-bar {
  font-size: 11px;
  color: var(--text2);
  padding: 3px 14px 4px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#status-bar .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
#status-bar .dot.ok { background: var(--green); }
#status-bar .dot.err { background: var(--red); }

/* ── Registration / Settings Modal ── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center; justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 28px 24px;
  width: 340px;
  max-width: calc(100vw - 32px);
  box-shadow: 0 16px 48px rgba(0,0,0,.6);
  animation: fadeIn .2s ease;
}
#modal h2 { font-size: 18px; margin-bottom: 20px; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.modal-field input[type="text"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 14px;
}
.modal-field input[type="text"]:focus { outline: none; border-color: var(--accent); }
.color-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.color-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color .15s, transform .1s;
}
.color-swatch.selected { border-color: #fff; transform: scale(1.15); }
#modal-save {
  width: 100%;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 11px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
}
#modal-save:hover { filter: brightness(1.15); }
#modal-note { font-size: 11px; color: var(--text2); text-align: center; margin-top: 10px; }

/* ── Not-registered overlay ── */
#not-registered {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 150;
  align-items: center; justify-content: center;
}
#not-registered.show { display: flex; }
#not-registered-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  width: 320px;
  max-width: calc(100vw - 32px);
  box-shadow: 0 16px 48px rgba(0,0,0,.6);
}
#not-registered-box p { color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
#btn-go-register {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
#btn-go-register:hover { filter: brightness(1.15); }

/* ── Mobile tweaks ── */
@media (max-width: 500px) {
  #header { padding: 8px 12px; }
  #header h1 { font-size: 15px; }
  #input-area { padding: 8px 10px; }
  #emoji-picker { width: 240px; right: -40px; }
  .msg { max-width: 90%; }
}

/* ── Users button ── */
#btn-users {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}
#btn-users:hover { background: var(--bg4); }

/* ── Users panel (slide-out) ── */
#users-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 240px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 300;
  transform: translateX(100%);
  transition: transform .2s ease;
  box-shadow: -4px 0 24px rgba(0,0,0,.4);
}
#users-panel.open { transform: none; }
#users-panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  font-weight: 700;
  font-size: 15px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#users-panel-hdr button {
  background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer;
}
#users-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.user-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background .1s;
}
.user-item:hover { background: var(--bg3); }
.user-item .u-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.user-item .u-name { font-size: 14px; font-weight: 600; }
.user-item .u-sub { font-size: 11px; color: var(--text2); }
.user-item .u-dm-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  display: none;
}
.user-item.has-unread .u-dm-badge { display: block; }

/* ── DM pane ── */
#dm-pane {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  z-index: 400;
  transform: translateX(100%);
  transition: transform .2s ease;
}
#dm-pane.open { transform: none; }
#dm-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#dm-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#dm-messages::-webkit-scrollbar { width: 4px; }
#dm-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
#dm-input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#dm-inp {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 36px;
  max-height: 120px;
  font-family: inherit;
}
#dm-inp:focus { border-color: var(--accent); }
#dm-send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 8px;
  width: 36px; height: 36px;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#dm-send-btn:hover { filter: brightness(1.15); }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <h1>💬 DRGR Chat Room</h1>
    <span id="online-badge">● на связи</span>
    <button id="btn-users" onclick="toggleUsersPanel()" title="Показать участников чата / личные сообщения">👥 Пользователи</button>
    <div id="user-info" onclick="openSettings()" title="Изменить профиль">
      <div id="header-avatar">?</div>
      <span id="header-nick">Войти</span>
    </div>
    <button id="btn-settings" onclick="openSettings()">⚙️ Профиль</button>
  </div>

  <!-- Messages -->
  <!-- Pinned messages bar -->
  <div id="pinned-bar" onclick="scrollToPinned()">
    <span id="pinned-bar-icon">📌</span>
    <span id="pinned-bar-text">Закреплённое сообщение</span>
    <span id="pinned-bar-count">1</span>
  </div>

  <div id="messages"></div>

  <!-- Reply bar -->
  <div id="reply-bar">
    <span>↩</span>
    <div id="reply-bar-text"><span id="reply-bar-nick"></span>: <span id="reply-bar-preview"></span></div>
    <button id="reply-bar-cancel" onclick="cancelReply()" title="Отменить ответ">✕</button>
  </div>

  <!-- Edit bar -->
  <div id="edit-bar">
    <span>✏️</span>
    <span id="edit-bar-label">Редактирование сообщения</span>
    <button id="edit-bar-cancel" onclick="cancelEdit()" title="Отменить редактирование">✕</button>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div id="emoji-wrap">
      <button id="btn-emoji-open" onclick="toggleEmojiPicker()" title="Вставить эмодзи">😊</button>
      <div id="emoji-picker">
        <input id="ep-search" type="text" placeholder="Поиск эмодзи…"
          style="width:100%;padding:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;margin-bottom:6px;box-sizing:border-box"
          oninput="filterEmojis(this.value)" autocomplete="off"/>
        <div class="ep-grid"></div>
      </div>
    </div>
    <textarea id="msg-inp" rows="1" maxlength="2000"
      placeholder="Введите сообщение… (Enter — отправить, Shift+Enter — новая строка)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
      oninput="autoResize(this)"></textarea>
    <button id="btn-send" onclick="sendMsg()">➤</button>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <span class="dot ok" id="conn-dot"></span>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
var BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://' + location.host
  : '';

// ── Avatar colors ────────────────────────────────────────────────────────────
var COLORS = [
  "#e74c3c","#e67e22","#f1c40f","#2ecc71","#1abc9c",
  "#3498db","#9b59b6","#e91e63","#00bcd4","#ff5722",
  "#8bc34a","#607d8b","#ff9800","#795548","#673ab7",
];

function avatarInitial(nick) {
  var n = (nick || '').trim();
  return n.length ? n[0].toUpperCase() : '?';
}

function buildAvatarHTML(nick, color, size) {
  size = size || 32;
  return '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;'
    + 'background:' + _esc(color) + ';display:flex;align-items:center;justify-content:center;'
    + 'font-size:' + Math.round(size * 0.42) + 'px;font-weight:700;color:#fff;flex-shrink:0;">'
    + _esc(avatarInitial(nick)) + '</div>';
}

// ── User profile ─────────────────────────────────────────────────────────────
var _nick = '';
var _color = '';
var _registered = false;

function _loadProfile() {
  var stored = localStorage.getItem('drgr_chat_profile');
  if (stored) {
    try {
      var p = JSON.parse(stored);
      _nick = (p.nick || '').trim();
      _color = p.color || '';
      _registered = !!_nick;
    } catch(e) {}
  }
}

function _updateHeaderUI() {
  var av = document.getElementById('header-avatar');
  var nk = document.getElementById('header-nick');
  if (_registered && _nick) {
    av.textContent = avatarInitial(_nick);
    av.style.background = _color || '#607d8b';
    nk.textContent = _nick;
  } else {
    av.textContent = '?';
    av.style.background = '#444';
    nk.textContent = 'Войти';
  }
}

// ── Color grid ───────────────────────────────────────────────────────────────
var _selectedColor = COLORS[5];  // default blue

function buildColorGrid() {
  var grid = document.getElementById('color-grid');
  COLORS.forEach(function(c) {
    var sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c;
    sw.dataset.color = c;
    sw.title = c;
    sw.addEventListener('click', function() {
      document.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('selected'); });
      sw.classList.add('selected');
      _selectedColor = c;
    });
    grid.appendChild(sw);
  });
}

function selectColorSwatch(c) {
  document.querySelectorAll('.color-swatch').forEach(function(s) {
    s.classList.toggle('selected', s.dataset.color === c);
  });
  _selectedColor = c;
}

// ── Modal open/close ──────────────────────────────────────────────────────────
function openRegister() {
  document.getElementById('not-registered').classList.remove('show');
  openModal(false);
}

function openModal(isSettings) {
  _selectedColor = _color || COLORS[5];
  document.getElementById('modal-nick').value = _nick || '';
  document.getElementById('modal-title').textContent = isSettings ? '⚙️ Профиль' : '👤 Регистрация';
  document.getElementById('modal-save').textContent = isSettings ? '💾 Сохранить' : '💾 Сохранить и войти';
  selectColorSwatch(_selectedColor);
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(function() { document.getElementById('modal-nick').focus(); }, 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function openSettings() {
  openModal(true);
}

// ── Save profile ──────────────────────────────────────────────────────────────
function saveProfile() {
  var nick = document.getElementById('modal-nick').value.trim().slice(0, 32);
  if (!nick) {
    document.getElementById('modal-nick').style.borderColor = '#f44747';
    document.getElementById('modal-nick').focus();
    return;
  }
  document.getElementById('modal-nick').style.borderColor = '';

  _nick = nick;
  _color = _selectedColor;
  _registered = true;
  localStorage.setItem('drgr_chat_profile', JSON.stringify({nick: _nick, color: _color}));

  // Register with server
  fetch(BASE + '/chatroom/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({nick: _nick, color: _color}),
  }).catch(function() {});

  _updateHeaderUI();
  closeModal();
  addSys('Добро пожаловать, ' + _nick + '! 👋');
  connectDmSSE();
  refreshUsers();
}

  '🍕','🍔','🍟','🌮','🌯','🍜','🍣','🍩','🍰','🎂','☕','🍵','🍺','🥤','🧃','🥂',

  '🐍','🦀','🦕','🐘','💠','🔷','🔶','🟥','🟩','🟦',

var _epBuilt = false;
function _insertEmoji(e) {
  var inp = document.getElementById('msg-inp');
  var pos = inp.selectionStart || inp.value.length;
  inp.value = inp.value.slice(0, pos) + e + inp.value.slice(pos);
  inp.selectionStart = inp.selectionEnd = pos + e.length;
  inp.focus();
  document.getElementById('emoji-picker').style.display = 'none';
  autoResize(inp);
}
function filterEmojis(q) {
  var grid = document.querySelector('#emoji-picker .ep-grid');
  if (!grid) return;
  var btns = grid.querySelectorAll('.ep-btn');
  var lower = q.toLowerCase();
  btns.forEach(function(b) {
    b.style.display = (!lower || b.textContent.toLowerCase().includes(lower)) ? '' : 'none';
  });
}
function toggleEmojiPicker() {
  var picker = document.getElementById('emoji-picker');
  if (picker.style.display === 'block') { picker.style.display = 'none'; return; }
  if (!_epBuilt) {
    var grid = picker.querySelector('.ep-grid');
    _EMOJIS.forEach(function(e) {
      var b = document.createElement('button');
      b.className = 'ep-btn'; b.textContent = e; b.title = e;
      b.addEventListener('click', function() { _insertEmoji(e); });
      grid.appendChild(b);
    });
    _epBuilt = true;
  }
  // Reset search
  var search = document.getElementById('ep-search');
  if (search) { search.value = ''; filterEmojis(''); }
  picker.style.display = 'block';
  if (search) setTimeout(function() { search.focus(); }, 30);
  setTimeout(function() {
    function _close(ev) {
      var btn = document.getElementById('btn-emoji-open');
      if (!picker.contains(ev.target) && ev.target !== btn) {
        picker.style.display = 'none';
        document.removeEventListener('click', _close);
      }
    }
    document.addEventListener('click', _close);
  }, 10);
}

// ── Textarea auto-resize ──────────────────────────────────────────────────────
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;');
}

// ── Render messages ──────────────────────────────────────────────────────────
var _msgs = document.getElementById('messages');

// Delegate reaction pill clicks (safe, no inline event handlers)
_msgs.addEventListener('click', function(e) {
  var pill = e.target.closest('.reaction-pill');
  if (pill) {
    sendReactionDirect(pill.dataset.msg, pill.dataset.emoji);
  }
});

function addMsg(m) {
  if (m.deleted) {
    _updateMsgDeleted(m.id);
    return;
  }
  var isMe = (m.nick === _nick);
  var color = m.color || _nickColor(m.nick);
  var initial = avatarInitial(m.nick);

  var div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'msg-me' : 'msg-other');
  div.dataset.id = m.id || '';
  div.dataset.nick = m.nick || '';
  div.dataset.text = m.text || '';

  var nickLabel = isMe ? 'Вы' : _esc(m.nick);

  // Reply quote HTML
  var replyHtml = '';
  if (m.reply_to) {
    var rt = m.reply_to;
    replyHtml = '<div class="msg-reply" onclick="scrollToMsg(' + (rt.id||0) + ')">' +
      '<span class="msg-reply-nick">' + _esc(rt.nick || '') + '</span>' +
      ' ' + _esc((rt.text || '').slice(0, 80)) +
      '</div>';
  }

  // Reactions HTML
  var reactHtml = _buildReactionsHTML(m.id, m.reactions || {});

  var tsExtra = m.edited ? '<span class="msg-edited-badge">изменено</span>' : '';

  div.innerHTML =
    '<div class="msg-avatar-wrap">' +
      '<div class="msg-avatar" style="background:' + _esc(color) + '">' + _esc(initial) + '</div>' +
    '</div>' +
    '<div class="msg-content">' +
      '<div class="msg-nick">' + nickLabel + '</div>' +
      replyHtml +
      '<div class="msg-bubble">' + _esc(m.text) + '</div>' +
      '<div class="msg-ts">' + _esc(m.ts || '') + tsExtra + '</div>' +
      '<div class="msg-reactions" id="react-' + m.id + '">' + reactHtml + '</div>' +
    '</div>';

  // Context menu via long-press or right-click
  div.addEventListener('contextmenu', function(e) { e.preventDefault(); openCtxMenu(e, m.id, isMe); });
  var _pressTimer;
  div.addEventListener('touchstart', function(e) {
    _pressTimer = setTimeout(function() { openCtxMenu(e.touches[0], m.id, isMe); }, 600);
  }, { passive: true });
  div.addEventListener('touchend', function() { clearTimeout(_pressTimer); });
  div.addEventListener('touchmove', function() { clearTimeout(_pressTimer); });

  _msgs.appendChild(div);
  _scrollBottom();
}

function _buildReactionsHTML(msgId, reactions) {
  if (!reactions || !Object.keys(reactions).length) return '';
  var html = '';
  Object.keys(reactions).forEach(function(emoji) {
    var users = reactions[emoji] || [];
    if (!users.length) return;
    var mine = users.indexOf(_nick) >= 0;
    html += '<span class="reaction-pill' + (mine ? ' mine' : '') +
      '" data-msg="' + msgId + '" data-emoji="' + _esc(emoji) + '" title="' + _esc(users.join(', ')) + '">' +
      _esc(emoji) + '<span class="reaction-count">' + users.length + '</span></span>';
  });
  return html;
}

function addSys(text) {
  var div = document.createElement('div');
  div.className = 'msg msg-sys';
  div.innerHTML = '<div class="msg-bubble">' + _esc(text) + '</div>';
  _msgs.appendChild(div);
  _scrollBottom();
}

function _scrollBottom() {
  _msgs.scrollTop = _msgs.scrollHeight;
}

// Deterministic color from nick (for messages from users without stored color)
function _nickColor(nick) {
  var h = 0;
  for (var i = 0; i < (nick || '').length; i++) h = (h * 31 + nick.charCodeAt(i)) >>> 0;
  return COLORS[h % COLORS.length];
}

// ── Status bar ────────────────────────────────────────────────────────────────
function setStatus(ok, text) {
  var dot = document.getElementById('conn-dot');
  var lbl = document.getElementById('conn-label');
  dot.className = 'dot ' + (ok ? 'ok' : 'err');
  lbl.textContent = text;
}

// ── Load history ──────────────────────────────────────────────────────────────
function loadHistory() {
  fetch(BASE + '/chatroom/history')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var msgs = d.messages || [];
      msgs.forEach(function(m) {
        if (m.deleted) {
          // Render deleted placeholder
          var div = document.createElement('div');
          div.className = 'msg ' + (m.nick === _nick ? 'msg-me' : 'msg-other') + ' msg-deleted';
          div.dataset.id = m.id || '';
          div.dataset.nick = m.nick || '';
          div.dataset.text = '';
          div.innerHTML = '<div class="msg-content"><div class="msg-bubble">🗑 Сообщение удалено</div></div>';
          _msgs.appendChild(div);
        } else {
          addMsg(m);
        }
        if (m.id && m.id > _lastMsgId) _lastMsgId = m.id;
      });
      _scrollBottom();
    })
    .catch(function() {});
}

// ── SSE connection ────────────────────────────────────────────────────────────
var _lastMsgId = 0;
var _es = null;
var _reconnectDelay = 1500;
// State for reply and edit
var _replyToId = null;
var _editMsgId = null;
// Pinned messages
var _currentPins = [];

function connectSSE() {
  if (_es) { try { _es.close(); } catch(e) {} }
  _es = new EventSource(BASE + '/chatroom/events');
  _es.onopen = function() {
    setStatus(true, 'Подключено');
    _reconnectDelay = 1500;
  };
  _es.onmessage = function(ev) {
    var data;
    try { data = JSON.parse(ev.data); } catch(e) { return; }
    if (!data || data.type === 'ping' || data.type === 'connected') return;
    // Handle typed events
    if (data.type === 'reaction') {
      _updateReactions(data.msg_id, data.reactions);
      return;
    }
    if (data.type === 'edit') {
      _updateMsgEdit(data.msg_id, data.text);
      return;
    }
    if (data.type === 'delete') {
      _updateMsgDeleted(data.msg_id);
      return;
    }
    if (data.type === 'pin_update') {
      _currentPins = data.pins || [];
      _refreshPinnedBar();
      return;
    }
    // Regular message
    if (data.id && data.id <= _lastMsgId) return;
    if (data.id) _lastMsgId = data.id;
    addMsg(data);
  };
  _es.onerror = function() {
    setStatus(false, 'Переподключение…');
    _es.close();
    setTimeout(function() {
      _reconnectDelay = Math.min(_reconnectDelay * 1.5, 15000);
      connectSSE();
    }, _reconnectDelay);
  };
}

// ── Send message ──────────────────────────────────────────────────────────────
function sendMsg() {
  if (!_registered) {
    document.getElementById('not-registered').classList.add('show');
    return;
  }
  var inp = document.getElementById('msg-inp');
  var text = inp.value.trim();
  if (!text) return;
  var btn = document.getElementById('btn-send');
  btn.disabled = true;

  // Handle edit mode
  if (_editMsgId) {
    fetch(BASE + '/chatroom/edit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({nick: _nick, msg_id: _editMsgId, text: text}),
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          inp.value = '';
          autoResize(inp);
          cancelEdit();
          inp.focus();
        } else {
          addSys('⚠ ' + (d.error || 'Ошибка редактирования'));
        }
      })
      .catch(function() { addSys('⚠ Ошибка соединения'); })
      .finally(function() { btn.disabled = false; });
    return;
  }

  var body = {nick: _nick, text: text, color: _color};
  if (_replyToId) body.reply_to = _replyToId;

  fetch(BASE + '/chatroom/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        inp.value = '';
        autoResize(inp);
        cancelReply();
        inp.focus();
      } else {
        addSys('⚠ ' + (d.error || 'Ошибка отправки'));
      }
    })
    .catch(function() { addSys('⚠ Ошибка соединения'); })
    .finally(function() { btn.disabled = false; });
}

// ── Context menu ──────────────────────────────────────────────────────────────
var _ctxMsgId = null;
var _ctxIsMe = false;

function openCtxMenu(e, msgId, isMe) {
  _ctxMsgId = msgId;
  _ctxIsMe  = isMe;
  var menu = document.getElementById('ctx-menu');
  document.getElementById('ctx-edit').style.display   = isMe ? '' : 'none';
  document.getElementById('ctx-delete').style.display = isMe ? '' : 'none';

  var x = e.clientX !== undefined ? e.clientX : e.pageX;
  var y = e.clientY !== undefined ? e.clientY : e.pageY;
  menu.style.display = 'block';
  // Position within viewport
  var mw = menu.offsetWidth || 180, mh = menu.offsetHeight || 200;
  x = Math.min(x, window.innerWidth  - mw - 8);
  y = Math.min(y, window.innerHeight - mh - 8);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';

  // Close on outside click
  setTimeout(function() {
    document.addEventListener('click', _closeCtxMenu, { once: true });
    document.addEventListener('touchstart', _closeCtxMenu, { once: true });
  }, 50);
}

function _closeCtxMenu() {
  var menu = document.getElementById('ctx-menu');
  if (menu) menu.style.display = 'none';
  var rp = document.getElementById('reaction-picker');
  if (rp) rp.style.display = 'none';
}

function showReactionPicker() {
  var menu = document.getElementById('ctx-menu');
  var rp   = document.getElementById('reaction-picker');
  // Position near the context menu
  rp.style.display = 'flex';
  var ml = parseInt(menu.style.left) || 0;
  var mt = parseInt(menu.style.top)  || 0;
  rp.style.left = ml + 'px';
  rp.style.top  = (mt - 60) + 'px';
  menu.style.display = 'none';
  setTimeout(function() {
    document.addEventListener('click', function() {
      rp.style.display = 'none';
    }, { once: true });
  }, 50);
}

function sendReaction(emoji) {
  document.getElementById('reaction-picker').style.display = 'none';
  if (!_ctxMsgId || !_registered) return;
  sendReactionDirect(_ctxMsgId, emoji);
}

function sendReactionDirect(msgId, emoji) {
  if (!_registered) return;
  fetch(BASE + '/chatroom/react', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({nick: _nick, msg_id: parseInt(msgId), emoji: emoji}),
  }).catch(function() {});
}

function _updateReactions(msgId, reactions) {
  var el = document.getElementById('react-' + msgId);
  if (el) el.innerHTML = _buildReactionsHTML(msgId, reactions);
  // Also update data-text for the owning message
  var msg = _msgs.querySelector('[data-id="' + msgId + '"]');
  if (msg) msg._reactionsData = reactions;
}

function copyMsgText() {
  var msg = _msgs.querySelector('[data-id="' + _ctxMsgId + '"]');
  if (msg) {
    var text = msg.dataset.text || '';
    navigator.clipboard && navigator.clipboard.writeText(text).catch(function() {});
  }
  _closeCtxMenu();
}

function replyToMsg() {
  _closeCtxMenu();
  var msg = _msgs.querySelector('[data-id="' + _ctxMsgId + '"]');
  if (!msg) return;
  _replyToId = _ctxMsgId;
  document.getElementById('reply-bar-nick').textContent    = msg.dataset.nick || '';
  document.getElementById('reply-bar-preview').textContent = (msg.dataset.text || '').slice(0, 60);
  document.getElementById('reply-bar').classList.add('show');
  document.getElementById('msg-inp').focus();
}

function cancelReply() {
  _replyToId = null;
  document.getElementById('reply-bar').classList.remove('show');
}

function editMsg() {
  _closeCtxMenu();
  var msg = _msgs.querySelector('[data-id="' + _ctxMsgId + '"]');
  if (!msg) return;
  _editMsgId = _ctxMsgId;
  var inp = document.getElementById('msg-inp');
  inp.value = msg.dataset.text || '';
  autoResize(inp);
  document.getElementById('edit-bar').classList.add('show');
  inp.focus();
}

function cancelEdit() {
  _editMsgId = null;
  document.getElementById('edit-bar').classList.remove('show');
  var inp = document.getElementById('msg-inp');
  inp.value = '';
  autoResize(inp);
}

function _updateMsgEdit(msgId, text) {
  var msg = _msgs.querySelector('[data-id="' + msgId + '"]');
  if (!msg) return;
  var bubble = msg.querySelector('.msg-bubble');
  if (bubble) bubble.textContent = text;
  msg.dataset.text = text;
  var ts = msg.querySelector('.msg-ts');
  if (ts && !ts.querySelector('.msg-edited-badge')) {
    ts.insertAdjacentHTML('beforeend', '<span class="msg-edited-badge">изменено</span>');
  }
}

function deleteMsg() {
  _closeCtxMenu();
  if (!_ctxMsgId || !_registered) return;
  fetch(BASE + '/chatroom/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({nick: _nick, msg_id: _ctxMsgId}),
  }).catch(function() {});
}

function _updateMsgDeleted(msgId) {
  var msg = _msgs.querySelector('[data-id="' + msgId + '"]');
  if (!msg) return;
  var bubble = msg.querySelector('.msg-bubble');
  if (bubble) bubble.textContent = '🗑 Сообщение удалено';
  msg.classList.add('msg-deleted');
  msg.dataset.text = '';
  // Remove reactions since message is deleted
  var reactEl = document.getElementById('react-' + msgId);
  if (reactEl) reactEl.innerHTML = '';
}

// ── Pinned messages ────────────────────────────────────────────────────────────
function pinMsg() {
  _closeCtxMenu();
  if (!_ctxMsgId || !_registered) return;
  fetch(BASE + '/chatroom/pin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({nick: _nick, msg_id: _ctxMsgId}),
  }).catch(function() {});
}

function _refreshPinnedBar() {
  var bar = document.getElementById('pinned-bar');
  if (!_currentPins || !_currentPins.length) {
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  // Fetch pinned message details
  fetch(BASE + '/chatroom/pins')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var pins = d.pins || [];
      if (!pins.length) { bar.classList.remove('show'); return; }
      var last = pins[pins.length - 1];
      document.getElementById('pinned-bar-text').textContent =
        (last.nick ? last.nick + ': ' : '') + (last.text || '').slice(0, 80);
      document.getElementById('pinned-bar-count').textContent = pins.length;
      bar._pins = pins;
    })
    .catch(function() {});
}

function scrollToPinned() {
  var bar = document.getElementById('pinned-bar');
  var pins = bar._pins;
  if (!pins || !pins.length) return;
  var last = pins[pins.length - 1];
  scrollToMsg(last.id);
}

function scrollToMsg(msgId) {
  var el = _msgs.querySelector('[data-id="' + msgId + '"]');
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.background = 'rgba(0,120,212,.2)';
    setTimeout(function() { el.style.background = ''; }, 1500);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  buildColorGrid();
  _loadProfile();
  _updateHeaderUI();

  if (!_registered) {
    // Show registration modal on first visit
    openModal(false);
  }

  loadHistory();
  connectSSE();

  // Load initial pinned messages
  fetch(BASE + '/chatroom/pins')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var pins = d.pins || [];
      _currentPins = pins.map(function(p) { return p.id; });
      _refreshPinnedBar();
    })
    .catch(function() {});

  var inp = document.getElementById('msg-inp');
  inp.addEventListener('input', function() { autoResize(inp); });

  // Enter on nick field focuses modal-save
  document.getElementById('modal-nick').addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') saveProfile();
  });

  // Start DM SSE if registered
  if (_registered && _nick) {
    connectDmSSE();
    refreshUsers();
    setInterval(refreshUsers, 30000);
  }
})();

// ── Users panel ───────────────────────────────────────────────────────────────
var _usersPanelOpen = false;
function toggleUsersPanel() {
  var panel = document.getElementById('users-panel');
  _usersPanelOpen = !_usersPanelOpen;
  if (_usersPanelOpen) {
    panel.classList.add('open');
    refreshUsers();
  } else {
    panel.classList.remove('open');
  }
}

function refreshUsers() {
  fetch(BASE + '/chatroom/users')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var list = document.getElementById('users-list');
      if (!list) return;
      list.innerHTML = '';
      var online = d.users || [];
      // Update online badge
      var badge = document.getElementById('online-badge');
      if (badge) badge.textContent = '● ' + online.length + ' онлайн';
      online.forEach(function(u) {
        if (u.nick === _nick) return; // don't show self
        var div = document.createElement('div');
        div.className = 'user-item' + (_dmUnread[u.nick] ? ' has-unread' : '');
        div.innerHTML =
          '<div class="u-avatar" style="background:' + _esc(u.color || '#888') + '">' +
            _esc(avatarInitial(u.nick)) + '</div>' +
          '<div><div class="u-name">' + _esc(u.nick) + '</div>' +
          '<div class="u-sub">нажмите для личного чата</div></div>' +
          '<span class="u-dm-badge">' + (_dmUnread[u.nick] || '') + '</span>';
        div.addEventListener('click', function() { openDm(u.nick, u.color); });
        list.appendChild(div);
      });
      if (!online.filter(function(u){return u.nick!==_nick;}).length) {
        list.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:13px;text-align:center">Нет других пользователей онлайн</div>';
      }
    })
    .catch(function() {});
}

// ── DM logic ──────────────────────────────────────────────────────────────────
var _dmTarget = null;
var _dmColor = '#888';
var _dmEs = null;
var _dmUnread = {};  // nick → unread count

function openDm(nick, color) {
  _dmTarget = nick;
  _dmColor = color || _nickColor(nick);
  // Update DM header
  var hdrAvatar = document.getElementById('dm-hdr-avatar');
  var hdrNick   = document.getElementById('dm-hdr-nick');
  if (hdrAvatar) { hdrAvatar.style.background = _dmColor; hdrAvatar.textContent = avatarInitial(nick); }
  if (hdrNick)   hdrNick.textContent = nick;

  // Clear unread
  delete _dmUnread[nick];

  // Load DM history
  var msgs = document.getElementById('dm-messages');
  if (msgs) msgs.innerHTML = '';
  fetch(BASE + '/chatroom/dm/history?from=' + encodeURIComponent(_nick) + '&to=' + encodeURIComponent(nick))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      (d.messages || []).forEach(function(m) { addDmMsg(m); });
    })
    .catch(function() {});

  // Show DM pane
  document.getElementById('dm-pane').classList.add('open');
  if (_usersPanelOpen) toggleUsersPanel();
  setTimeout(function() {
    var inp = document.getElementById('dm-inp');
    if (inp) inp.focus();
    _dmScrollBottom();
  }, 100);
}

function closeDm() {
  document.getElementById('dm-pane').classList.remove('open');
  _dmTarget = null;
}

function addDmMsg(m) {
  var container = document.getElementById('dm-messages');
  if (!container) return;
  var isMe = (m.from === _nick);
  var nick = isMe ? _nick : m.from;
  var color = m.color || _nickColor(nick);
  var div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'msg-me' : 'msg-other');
  div.innerHTML =
    '<div class="msg-avatar-wrap">' +
      '<div class="msg-avatar" style="background:' + _esc(color) + '">' + _esc(avatarInitial(nick)) + '</div>' +
    '</div>' +
    '<div class="msg-content">' +
      '<div class="msg-nick">' + _esc(isMe ? 'Вы' : m.from) + '</div>' +
      '<div class="msg-bubble">' + _esc(m.text) + '</div>' +
      '<div class="msg-ts">' + _esc(m.ts || '') + '</div>' +
    '</div>';
  container.appendChild(div);
  _dmScrollBottom();
}

function _dmScrollBottom() {
  var c = document.getElementById('dm-messages');
  if (c) c.scrollTop = c.scrollHeight;
}

function sendDm() {
  if (!_registered) { alert('Войдите в чат, чтобы отправлять личные сообщения'); return; }
  if (!_dmTarget) return;
  var inp = document.getElementById('dm-inp');
  var text = inp.value.trim();
  if (!text) return;
  var btn = document.getElementById('dm-send-btn');
  btn.disabled = true;
  fetch(BASE + '/chatroom/dm/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({from: _nick, to: _dmTarget, text: text, color: _color}),
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        inp.value = '';
        autoResize(inp);
        inp.focus();
      }
    })
    .catch(function() {})
    .finally(function() { btn.disabled = false; });
}

function connectDmSSE() {
  if (!_nick) return;
  if (_dmEs) { try { _dmEs.close(); } catch(e) {} }
  _dmEs = new EventSource(BASE + '/chatroom/dm/events?nick=' + encodeURIComponent(_nick));
  _dmEs.onmessage = function(ev) {
    var data;
    try { data = JSON.parse(ev.data); } catch(e) { return; }
    if (!data || data.type === 'ping' || data.type === 'connected') return;
    if (data.type !== 'dm') return;
    var partner = (data.from === _nick) ? data.to : data.from;
    // If the DM pane is open for this partner, show immediately
    if (_dmTarget === partner) {
      addDmMsg(data);
    } else {
      // Only increment unread for incoming messages (not own echoed sends)
      if (data.from !== _nick) {
        _dmUnread[data.from] = (_dmUnread[data.from] || 0) + 1;
        // Refresh users list if open
        if (_usersPanelOpen) refreshUsers();
      }
    }
  };
  _dmEs.onerror = function() {
    setTimeout(function() { connectDmSSE(); }, 5000);
  };
}
</script>
